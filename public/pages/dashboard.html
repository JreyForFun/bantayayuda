<!-- public/pages/dashboard.html — Dashboard View -->
<div class="page-header">
  <div>
    <h2>System Overview</h2>
    <p>Real-time metrics and operational updates</p>
  </div>
</div>

<div class="stats-grid">
  <div class="stat-card">
    <div class="stat-card-icon"><i data-lucide="users"></i></div>
    <div class="stat-card-label">Total Beneficiaries</div>
    <div class="stat-card-value" id="stat-total-beneficiaries">0</div>
  </div>
  
  <div class="stat-card">
    <div class="stat-card-icon"><i data-lucide="clipboard-list"></i></div>
    <div class="stat-card-label">Active Programs</div>
    <div class="stat-card-value" id="stat-total-programs">0</div>
  </div>
  
  <div class="stat-card">
    <div class="stat-card-icon"><i data-lucide="file-text"></i></div>
    <div class="stat-card-label">Total Applications</div>
    <div class="stat-card-value" id="stat-total-applications">0</div>
  </div>
  
  <div class="stat-card">
    <div class="stat-card-icon"><i data-lucide="check-circle"></i></div>
    <div class="stat-card-label">Approved</div>
    <div class="stat-card-value" id="stat-approved-applications">0</div>
  </div>
  
  <div class="stat-card">
    <div class="stat-card-icon"><i data-lucide="truck"></i></div>
    <div class="stat-card-label">Released</div>
    <div class="stat-card-value" id="stat-released-distributions">0</div>
  </div>
</div>

<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-top: 24px;">
  <!-- Left Column: Program Slots & Capacity -->
  <div class="card" style="display: flex; flex-direction: column; height: 400px;">
    <div class="modal-header" style="border-bottom: 1px solid var(--border); padding: 16px 20px;">
      <h3 style="font-size: 14px; font-weight: 600;">Program Slots & Capacity Utilization</h3>
    </div>
    <div class="card-body" id="dashboard-programs-utilization" class="utilization-list" style="overflow-y: auto; display: flex; flex-direction: column; gap: 16px; padding: 20px;">
      <!-- Dynamic list of programs loaded by JS -->
      <div class="text-muted text-center" style="padding: 40px 0;">Loading capacity metrics...</div>
    </div>
  </div>

  <!-- Right Column: Recent Activity Feed -->
  <div class="card" style="display: flex; flex-direction: column; height: 400px;">
    <div class="modal-header" style="border-bottom: 1px solid var(--border); padding: 16px 20px;">
      <h3 style="font-size: 14px; font-weight: 600;">Live Activity Stream</h3>
    </div>
    <div class="card-body" style="overflow-y: auto; padding: 20px;">
      <ul id="dashboard-recent-activities" class="activity-feed">
        <!-- Dynamic list of audit logs loaded by JS -->
        <li class="text-muted text-center" style="padding: 40px 0;">Loading activity stream...</li>
      </ul>
    </div>
  </div>
</div>
