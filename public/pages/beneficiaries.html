<!-- public/pages/beneficiaries.html — Beneficiary View -->
<div class="page-header">
  <div>
    <h2>Beneficiary Profiles</h2>
    <p>Manage and register community members eligible for assistance</p>
  </div>
  <button id="btn-add-beneficiary" class="btn btn-primary">
    <span>+</span> Register Beneficiary
  </button>
</div>

<!-- Search & Filter Controls -->
<div class="control-bar">
  <div class="control-group">
    <div class="search-input-wrapper">
      <input type="text" id="search-beneficiary" placeholder="Search by name, address, or ID...">
    </div>
    <select id="filter-beneficiary-category" class="filter-select">
      <option value="All">All Categories</option>
      <option value="Scholarship">Scholarship</option>
      <option value="Medical">Medical</option>
      <option value="Relief">Relief</option>
      <option value="Livelihood">Livelihood</option>
    </select>
  </div>
</div>

<!-- Data Table -->
<div class="table-container">
  <table class="table" id="table-beneficiaries">
    <thead>
      <tr>
        <th>Code</th>
        <th>Full Name</th>
        <th>Address</th>
        <th>Contact Number</th>
        <th>Category</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="beneficiaries-list-body">
      <tr>
        <td colspan="7" class="text-muted text-center" style="padding: 40px 0;">Loading records...</td>
      </tr>
    </tbody>
  </table>
</div>

<!-- Add/Edit Beneficiary Modal Overlay -->
<div id="modal-beneficiary" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="beneficiary-modal-title">Register Beneficiary</h3>
      <button class="btn-ghost close-modal" style="font-size: 16px;">✕</button>
    </div>
    <div class="modal-body">
      <form id="form-beneficiary">
        <input type="hidden" id="beneficiary-id">
        
        <div class="form-group">
          <label class="form-label" for="beneficiary-name">Full Name</label>
          <input type="text" id="beneficiary-name" class="form-input" required placeholder="e.g. Juan Dela Cruz">
        </div>
        
        <div id="duplicate-warning" class="alert alert-warning d-none" style="display: flex; align-items: center; gap: 8px;">
          <i data-lucide="alert-triangle" style="width: 14px; height: 14px; flex-shrink: 0;"></i>
          <span>A beneficiary with this name is already registered. Please check records.</span>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="beneficiary-address">Address</label>
          <input type="text" id="beneficiary-address" class="form-input" required placeholder="e.g. Brgy. 1, City Center">
        </div>
        
        <div class="form-grid-2">
          <div class="form-group">
            <label class="form-label" for="beneficiary-contact">Contact Number</label>
            <input type="text" id="beneficiary-contact" class="form-input" required placeholder="e.g. 09123456789">
          </div>
          
          <div class="form-group">
            <label class="form-label" for="beneficiary-birthdate">Birthdate</label>
            <input type="date" id="beneficiary-birthdate" class="form-input" required>
          </div>
        </div>
        
        <div class="form-grid-2">
          <div class="form-group">
            <label class="form-label" for="beneficiary-category">Assistance Category</label>
            <select id="beneficiary-category" class="form-select" required>
              <option value="" disabled selected>Select Category</option>
              <option value="Scholarship">Scholarship</option>
              <option value="Medical">Medical</option>
              <option value="Relief">Relief</option>
              <option value="Livelihood">Livelihood</option>
            </select>
          </div>
          
          <div class="form-group" id="status-group">
            <label class="form-label" for="beneficiary-status">Status</label>
            <select id="beneficiary-status" class="form-select">
              <option value="active">Active</option>
              <option value="inactive">Inactive</option>
            </select>
          </div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-outline close-modal">Cancel</button>
      <button type="submit" form="form-beneficiary" class="btn btn-primary" id="btn-save-beneficiary">Save Beneficiary</button>
    </div>
  </div>
</div>
